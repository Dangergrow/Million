<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Миллионер — wealth OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/main.css">
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="aurora"><span></span><span></span><span></span></div>

<div class="shell">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-logo">₽</div>
      <div class="brand-txt"><b>Миллионер</b><span>WEALTH OS</span></div>
    </div>

    <nav class="nav" id="nav">
      <button class="nav-item active" data-view="dashboard"><span class="ni">◈</span>Дашборд</button>
      <button class="nav-item" data-view="goals"><span class="ni">◎</span>Цели и Сейфы</button>
      <button class="nav-item" data-view="plan"><span class="ni">▤</span>План</button>
      <button class="nav-item" data-view="stats"><span class="ni">◭</span>Статистика</button>
      <button class="nav-item" data-view="categories"><span class="ni">❈</span>Категории</button>
      <button class="nav-item" data-view="settings"><span class="ni">⚙</span>Настройки</button>
    </nav>

    <div class="side-foot">
      <label class="lbl">Активный профиль</label>
      <select id="profileSelect" class="fld"></select>
      <div class="row-gap">
        <button class="icon-btn" data-act="new-profile" title="Новый профиль">＋</button>
        <button class="icon-btn" data-act="rename-profile" title="Переименовать">✎</button>
      </div>
    </div>
  </aside>

  <div class="scrim" id="scrim"></div>

  <main class="main">
    <header class="topbar">
      <button class="icon-btn burger" data-act="menu-toggle">☰</button>
      <h1 class="tb-title" id="viewTitle">Дашборд</h1>
      <div class="spacer"></div>
      <button class="pill income" data-act="tb-income">＋ Доход</button>
      <button class="pill expense" data-act="tb-expense">＋ Расход</button>
    </header>
    <div class="view-scroll" id="viewScroll">
      <section class="view active" id="view"></section>
    </div>
  </main>
</div>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<div class="toasts" id="toasts"></div>
<input type="file" id="importFile" accept="application/json" hidden>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="js/utils.js"></script>
<script src="js/state.js"></script>
<script src="js/compute.js"></script>
<script src="js/charts.js"></script>
<script src="js/ui.js"></script>
<script src="js/views.js"></script>
<script src="js/app.js"></script>
</body>
</html>
